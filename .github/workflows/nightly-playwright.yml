name: Nightly Playwright

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  visual:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright snapshots
        run: npm run test:visual

      - name: Upload Playwright artifacts (failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshot-artifacts
          path: |
            test-results
            playwright-report
            snapshots/playwright
